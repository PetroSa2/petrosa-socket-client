name: CI Checks

on:
  pull_request:
    if: github.event.pull_request.head.repo.full_name == github.repository
    branches: [main, develop]

jobs:
  lint:
    if: github.event.pull_request.head.repo.full_name == github.repository
    name: Lint & Format Check
    runs-on: petrosa-org-runners
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends make
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run linting
        run: make lint
        continue-on-error: true  # Temporary while baseline lint debt is reduced

      - name: Run type check
        run: make type-check
        continue-on-error: true  # Allow type check failures initially

  test:
    if: github.event.pull_request.head.repo.full_name == github.repository
    name: Test & Coverage
    runs-on: petrosa-org-runners
    env:
      OTEL_NO_AUTO_INIT: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends make
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        timeout-minutes: 10
        run: make test
        continue-on-error: true  # Temporary while legacy failures are being remediated

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: PetroSa2/petrosa-socket-client
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  test-quality:
    if: github.event.pull_request.head.repo.full_name == github.repository
    name: Test Quality Check
    runs-on: petrosa-org-runners
    steps:
      - name: Checkout service code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ensure check script is executable
        run: chmod +x scripts/check-test-assertions.py

      - name: Check test assertions
        run: |
          # Check only canonical test suite to avoid script/quarantine false positives
          TEST_FILES=$(find tests -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -v "__pycache__" || true)
          if [ -z "$TEST_FILES" ]; then
            echo "⚠️  No test files found under tests/ - skipping test quality check"
            exit 0
          fi
          echo "Found test files:"
          echo "$TEST_FILES" | sed 's/^/  - /'
          python scripts/check-test-assertions.py $(echo "$TEST_FILES" | tr '\n' ' ')
          if [ $? -ne 0 ]; then
            echo "❌ Tests without assertions detected"
            exit 1
          fi
          echo "✅ All tests have assertions"

  security:
    if: github.event.pull_request.head.repo.full_name == github.repository
    name: Security Scan
    runs-on: petrosa-org-runners
    permissions:
      contents: read
      security-events: write  # Required for SARIF upload
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret detection

      - name: 🔐 Run Gitleaks (Secret Detection)
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-git || echo "⚠️ Gitleaks found issues but continuing"
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🐍 Run Bandit (Python Security)
        run: |
          pip install bandit==1.7.5 pbr
          bandit -r . \
            --configfile pyproject.toml \
            --format json \
            --output bandit-report.json \
            || true
          echo "📊 Bandit Results:"
          python -m json.tool bandit-report.json 2>/dev/null | head -30 || echo "No issues found or report not available"

      - name: 🗂️ Run Trivy (Vulnerability Scanner)
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail if vulnerabilities found
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'

  documentation-standards:
    if: github.event.pull_request.head.repo.full_name == github.repository
    name: Documentation Standards Check
    runs-on: petrosa-org-runners
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for temporary documentation patterns
        run: |
          temp_docs=$(find docs/ -maxdepth 1 -type f -regex '.*_\(SUMMARY\|FIX\|COMPLETE\|STATUS\)\.md$' || true)
          if [ -n "$temp_docs" ]; then
            echo "❌ Found temporary documentation in docs/ root:"
            echo "$temp_docs"
            echo ""
            echo "These files should be in docs/archive/ subdirectories"
            exit 1
          fi
          echo "✅ Documentation standards check passed"

  pipeline:
    name: pipeline
    runs-on: petrosa-org-runners
    needs: [lint, test, test-quality, security, documentation-standards]
    if: always() && (github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Validate upstream job results
        run: |
          echo "lint=${{ needs.lint.result }}"
          echo "test=${{ needs.test.result }}"
          echo "test-quality=${{ needs.test-quality.result }}"
          echo "security=${{ needs.security.result }}"
          echo "documentation-standards=${{ needs.documentation-standards.result }}"

          [[ "${{ needs.lint.result }}" == "success" ]]
          [[ "${{ needs.test.result }}" == "success" ]]
          [[ "${{ needs.test-quality.result }}" == "success" ]]
          [[ "${{ needs.security.result }}" == "success" ]]
          [[ "${{ needs.documentation-standards.result }}" == "success" ]]
