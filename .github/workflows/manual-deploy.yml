name: Manual Deployment with Version Bump

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      reason:
        description: 'Reason for deployment (audit trail)'
        required: true
        type: string

env:
  NAMESPACE: petrosa-apps

jobs:
  version-and-deploy:
    name: Version Bump & Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Get current version
        id: current_version
        run: |
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Bump version
        id: bump_version
        run: |
          chmod +x scripts/bump-version.sh
          NEW_VERSION=$(./scripts/bump-version.sh "${{ steps.current_version.outputs.version }}" "${{ inputs.version_bump }}")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Create git tag
        run: |
          git tag -a "${{ steps.bump_version.outputs.new_version }}" -m "Manual deployment to ${{ inputs.environment }}: ${{ inputs.reason }}"
          git push origin "${{ steps.bump_version.outputs.new_version }}"
          echo "✅ Created and pushed tag: ${{ steps.bump_version.outputs.new_version }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/petrosa-socket-client
          tags: |
            type=raw,value=${{ steps.bump_version.outputs.new_version }}

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.bump_version.outputs.new_version }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.date }}

      - name: Checkout petrosa_k8s
        uses: actions/checkout@v4
        with:
          repository: PetroSa2/petrosa_k8s
          ref: main
          token: ${{ secrets.GITOPS_BOT_TOKEN }}
          path: petrosa_k8s

      - name: Rebase on main
        run: ./scripts/gitops-rebase-main.sh
        working-directory: petrosa_k8s

      - name: Update socket-client image tag in GitOps manifests
        run: |
          VERSION="${{ steps.bump_version.outputs.new_version }}"
          # Update the image tag in manifests
          find petrosa_k8s/k8s/socket-client -name "*.yaml" -o -name "*.yml" | xargs sed -i "s/VERSION_PLACEHOLDER/$VERSION/g"
          
          # Also update the version label if needed
          find petrosa_k8s/k8s/socket-client -name "*.yaml" -o -name "*.yml" | xargs sed -i "s/version: VERSION_PLACEHOLDER/version: $VERSION/g"
          
          echo "Updated socket-client image tag to $VERSION in petrosa_k8s/k8s/socket-client/"

      - name: Commit and push to petrosa_k8s
        working-directory: petrosa_k8s
        run: |
          git config user.name "gitops-bot"
          git config user.email "gitops-bot@users.noreply.github.com"
          git add k8s/socket-client/
          if git diff --staged --quiet; then
            echo "No changes to commit (version might already be up to date)"
          else
            git commit -m "gitops: socket-client image ${{ steps.bump_version.outputs.new_version }}"
            git push origin main
          fi

      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment..."
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=socket-client --insecure-skip-tls-verify
          kubectl get svc -n ${{ env.NAMESPACE }} -l app=socket-client --insecure-skip-tls-verify
          kubectl get ingress -n ${{ env.NAMESPACE }} -l app=socket-client --insecure-skip-tls-verify

          echo ""
          echo "📊 Deployment Summary:"
          echo "  ✅ Manual deployment to ${{ inputs.environment }} completed successfully"
          echo "  🐳 Image: ${{ secrets.DOCKERHUB_USERNAME }}/petrosa-socket-client:${{ steps.bump_version.outputs.new_version }}"
          echo "  📍 Namespace: ${{ env.NAMESPACE }}"
          echo "  🏷️  Version: ${{ steps.bump_version.outputs.new_version }}"
          echo "  📝 Reason: ${{ inputs.reason }}"
          echo "  👤 Triggered by: ${{ github.actor }}"
          echo "  🕒 Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo ""
          echo "🔍 Verify deployed image version:"
          echo "  kubectl get deployment -n ${{ env.NAMESPACE }} --insecure-skip-tls-verify -o jsonpath='{.items[*].spec.template.spec.containers[*].image}'"

  notify:
    name: Notify Deployment Status
    needs: version-and-deploy
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: none
    steps:
      - name: Notify Status
        run: |
          if [ "${{ needs.version-and-deploy.result }}" == "success" ]; then
            echo "✅ Manual deployment to ${{ inputs.environment }} successful!"
            echo "📝 Reason: ${{ inputs.reason }}"
            echo "👤 Triggered by: ${{ github.actor }}"
            echo "🕒 Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          else
            echo "❌ Manual deployment to ${{ inputs.environment }} failed!"
            echo "📝 Reason: ${{ inputs.reason }}"
            echo "👤 Triggered by: ${{ github.actor }}"
            echo "🕒 Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          fi
